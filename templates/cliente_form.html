{% extends "base.html" %}
{% block title %}{{ 'Nuevo Cliente' if not cliente else 'Editar Cliente' }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="d-flex align-items-center mb-4 gap-3">
      <a href="/clientes" class="btn btn-sm btn-outline-secondary">← Volver</a>
      <h4 class="fw-bold mb-0">{{ 'Nuevo Cliente' if not cliente else 'Nuevo Cliente' }}</h4>
    </div>

    <div class="card">
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="action" value="update_cliente">

          <div class="mb-3">
            <label class="form-label fw-semibold">Razón social *</label>
            <input type="text" name="nombre" class="form-control text-uppercase"
                   value="{{ cliente.nombre if cliente else '' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">NIT *</label>
            <input type="text" name="nit" class="form-control"
                   value="{{ cliente.nit if cliente else '' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Teléfono</label>
            <input type="text" name="telefono" class="form-control"
                   value="{{ cliente.telefono if cliente else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Dirección</label>
            <input type="text" name="direccion" class="form-control"
                   value="{{ cliente.direccion if cliente else '' }}">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Ciudad (facturación)</label>
            <input type="text" name="ciudad" class="form-control"
                   value="{{ cliente.ciudad if cliente else '' }}">
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Guardar cliente</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
